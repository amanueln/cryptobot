mode: "backtest"
default_pair: "BTC-USD"
default_granularity: "ONE_HOUR"
starting_balance_usd: 3000

simulation:
  maker_fee: 0.004
  taker_fee: 0.006
  slippage: 0.001
  poll_seconds: 60
  warmup_days: 30

data:
  db_path: "data/candles.db"
  cache_candles: true

# Momentum Rotation Engine (runs alongside grid trading)
momentum_rotation:
  enabled: true
  allocation_usd: 3000

# Early Momentum Scanner (alerts for manual trading)
early_scanner:
  enabled: true
  scan_interval_minutes: 10
  discord_webhook: "https://discord.com/api/webhooks/1493262458461225051/_sN7ixCsX8xRQl4quKQ4DFrGVsasV4Ehngex6yKfqLsXJOoTxX8SM0jAO9Z4r4uoW_Vz"
