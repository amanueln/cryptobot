mode: "backtest"
default_pair: "BTC-USD"
default_granularity: "ONE_HOUR"
starting_balance_usd: 3000

simulation:
  maker_fee: 0.004
  taker_fee: 0.006
  slippage: 0.001
  poll_seconds: 60
  warmup_days: 30

data:
  db_path: "data/candles.db"
  cache_candles: true

# Momentum Rotation Engine (runs alongside grid trading)
momentum_rotation:
  enabled: true
  allocation_usd: 3000

# Wall-aware trail stop — hugs qualifying bid walls instead of flat 2% trail.
# When enabled, the active stop is max(price_trail, wall_price * (1 - stop_offset_pct)).
# On by default — runtime toggle on the dashboard can still flip it off per session.
# Thresholds rationale + revisit trigger: memory/decision_wall_aware_thresholds.md
wall_aware_trail:
  enabled: true
  min_size_vs_position: 3.0      # wall USD must be at least this multiple of position equity
  min_persistence_ms: 10000      # wall must have sat at that price for this long (anti-spoof)
  max_dist_from_peak_pct: 1.5    # only consider walls within this % below the peak
  stop_offset_pct: 0.001         # stop sits this % below the wall price (0.1%)
  # Wall stop is only applied if it sits at least this fraction above entry,
  # so a wall-touch exit still clears round-trip fees. Prevents the early
  # "wall-hugging" state from locking in a guaranteed loss before the trade
  # has built any cushion. 0.012 = 1.2% = Coinbase round-trip taker fee.
  min_profit_buffer_pct: 0.012

# Entry pause — block new entries on specific weekdays (UTC).
# Motivation: 31-trade audit (2026-04-29) showed Sunday at 0% WR / -3.22% avg
# vs Saturday at 100% WR / +1.39% — Sunday is the clear loser. Pause blocks
# new entries only; existing positions still exit normally.
# weekday_block uses Python's datetime.weekday(): 0=Mon, 1=Tue, ..., 6=Sun.
# Disable entirely with enabled: false.
entry_pause:
  enabled: true
  weekday_block: [6]   # Sunday only — widen to [5,6] later if data confirms

# Market tape recorder — high-frequency WS capture of executed trades + L2 book
# snapshots on the watched pairs. Writes to data/market_tape.db (separate DB so
# it can't contend with the engine's own writes). Dedicated thread, fail-silent.
# Set enabled: false to kill the recorder without touching code.
#
# Pair list = union of (pairs that have passed gates) + (pairs we've traded) +
# (top pairs by avg accel that were blocked). The old "liquid majors" list was
# legacy — BTC/ETH/DOGE/AVAX/LINK/ADA/MATIC/DOT have never passed the momentum
# gates in live scanning, so recording tape on them is wasted disk.
market_tape:
  enabled: true
  pairs: [
    # Passed gates (15): these are what the bot actually picks
    "FARTCOIN-USD", "SAPIEN-USD", "AERO-USD", "MOODENG-USD", "SUI-USD",
    "XRP-USD", "METIS-USD", "TRB-USD", "ONDO-USD", "ICP-USD",
    "SOL-USD", "XLM-USD", "AAVE-USD", "ENA-USD", "AXL-USD",
    # Recently traded but not in 36h gate log (6)
    "MON-USD", "IRYS-USD", "VVV-USD", "WET-USD", "ZEC-USD", "ALGO-USD",
    # High-accel but blocked — near-miss research (5)
    "BIO-USD", "PNUT-USD", "CTSI-USD", "IP-USD", "NEAR-USD",
  ]
  l2_snapshot_interval_sec: 5    # cadence for writing full 50-level book snapshots
  l2_snapshot_depth: 50          # levels per side per snapshot
  matches_batch_size: 100        # flush buffered matches every N messages
  matches_flush_interval_sec: 5  # …or every N seconds, whichever comes first

# Early Momentum Scanner (alerts for manual trading)
early_scanner:
  enabled: true
  scan_interval_minutes: 10
  discord_webhook: "https://discord.com/api/webhooks/1493262458461225051/_sN7ixCsX8xRQl4quKQ4DFrGVsasV4Ehngex6yKfqLsXJOoTxX8SM0jAO9Z4r4uoW_Vz"
  # Strict Discord gate — combo must have n >= samples AND win_rate >= threshold
  # to ping. Alerts are still persisted to DB (dashboard shows them); only the
  # Discord notification is suppressed. Set very low to revert to old behavior.
  discord_min_combo_win_rate: 70.0
  discord_min_combo_samples: 10

# Scanner Bot — paper-trades +1 alerts from Early Scanner
scanner_bot:
  enabled: true
  eligible_combos:
    - mom_reversal+strong_move
    - mom_reversal+squeeze
  position_usd: 1000.0
  max_concurrent: 3
  starting_cash_usd: 3000.0
  same_pair_cooldown_hours: 4
  stop_pct: 15.0
  hold_hours: 24
  poll_interval_sec: 30
  # Refuse to trade alerts older than this — protects against replaying
  # historical alerts on bot restart and against acting on stale alerts after
  # bot downtime. The Discord ping has long since fired by then.
  alert_max_age_minutes: 5
  # discord_webhook reuses early_scanner.discord_webhook by default;
  # set this only to override
  discord_webhook: null
